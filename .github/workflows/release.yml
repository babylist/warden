name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        default: minor
        options:
          - minor
          - patch
          - major
      force:
        description: Force release (bypass blockers)
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Get auth token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SENTRY_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SENTRY_RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.token.outputs.token }}
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Calculate version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          CURRENT=$(node -p "require('./packages/warden/package.json').version")
          NEW=$(npx semver -i "$BUMP" $CURRENT)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT

      # Craft uses `git describe --tags` to find the previous version. The
      # published action tags point to detached dist/ artifact commits, so the
      # previous release must have created a reachable source tag before Craft
      # prepares the next changelog.
      - name: Verify previous source tag
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          SOURCE_TAG="v${VERSION}-src"

          if ! git rev-parse "$SOURCE_TAG^{commit}" >/dev/null 2>&1; then
            echo "::error::Missing source tag $SOURCE_TAG. The previous release did not finalize its source tag."
            exit 1
          fi

          DESCRIBED_TAG="$(git describe --tags --abbrev=0)"
          DESCRIBED_SHA="$(git rev-parse "$DESCRIBED_TAG^{commit}")"
          SOURCE_SHA="$(git rev-parse "$SOURCE_TAG^{commit}")"

          if [ "$DESCRIBED_SHA" != "$SOURCE_SHA" ]; then
            echo "::error::Expected git describe to resolve to $SOURCE_TAG ($SOURCE_SHA), got $DESCRIBED_TAG ($DESCRIBED_SHA)"
            exit 1
          fi

          echo "Craft previous-release baseline: $DESCRIBED_TAG ($DESCRIBED_SHA)"

      - name: Prepare release
        uses: getsentry/action-prepare-release@v1
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        with:
          version: ${{ steps.version.outputs.new }}
          force: ${{ inputs.force }}
