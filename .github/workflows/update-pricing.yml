name: Update model pricing

# Refreshes packages/warden/src/sdk/model-pricing.json from
# pydantic/genai-prices and opens/refreshes a PR when it changes.

on:
  schedule:
    # Nightly at 04:17 UTC. Off the top of the hour to avoid GitHub's
    # scheduler hot zones.
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-pricing
  cancel-in-progress: false

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Run pricing tests against the committed (known-good) snapshot before
      # updating so that exact-value assertions don't fail on legitimate price
      # changes from upstream.
      - name: Test pricing logic
        run: pnpm --filter @sentry/warden test src/sdk/pricing.test.ts

      - name: Refresh pricing data
        run: pnpm update-pricing

      # Validate the generated file is structurally sound without asserting
      # specific prices (which will differ whenever upstream changes them).
      - name: Validate pricing output
        run: |
          node -e "
            const p = JSON.parse(require('fs').readFileSync('packages/warden/src/sdk/model-pricing.json', 'utf8'));
            const entries = Object.entries(p);
            if (entries.length === 0) {
              process.stderr.write('error: pricing file is empty\n');
              process.exit(1);
            }
            const required = ['inputPerMTok', 'outputPerMTok', 'cacheReadPerMTok', 'cacheWritePerMTok', 'cacheWrite1hPerMTok', 'webSearchPer1K'];
            const tokenPriceFields = ['inputPerMTok', 'outputPerMTok', 'cacheReadPerMTok', 'cacheWritePerMTok', 'cacheWrite1hPerMTok'];
            for (const [model, v] of entries) {
              if (!v || typeof v !== 'object' || Array.isArray(v)) {
                process.stderr.write('error: invalid entry for ' + model + '\n');
                process.exit(1);
              }
              for (const field of required) {
                if (typeof v[field] !== 'number' || !Number.isFinite(v[field]) || v[field] < 0) {
                  process.stderr.write('error: invalid ' + field + ' for ' + model + '\n');
                  process.exit(1);
                }
              }
              if (!tokenPriceFields.some((field) => v[field] > 0)) {
                process.stderr.write('error: zero token pricing entry for ' + model + '\n');
                process.exit(1);
              }
            }
            console.log('Pricing output valid: ' + entries.length + ' entries');
          "

      - name: Check for pricing diff
        id: diff
        run: |
          if git diff --quiet -- packages/warden/src/sdk/model-pricing.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No pricing changes; skipping PR step."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or refresh pricing PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GIT_AUTHOR_NAME: Warden Pricing Workflow
          GIT_AUTHOR_EMAIL: actions@github.com
          GIT_COMMITTER_NAME: Warden Pricing Workflow
          GIT_COMMITTER_EMAIL: actions@github.com
        run: |
          # Use the default GITHUB_TOKEN (github-actions[bot]) for push and PR
          # creation. persist-credentials: false above keeps it out of git
          # config; we set it explicitly here so both git and gh CLI use it.
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git"
          pnpm --filter @sentry/warden update-pricing-pr
