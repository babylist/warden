name: CI

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: read
  statuses: write

on:
  push:
    branches: [main, "release/*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - name: Test
        env:
          VITEST_JUNIT: test-results.junit.xml
        run: pnpm test:coverage

      - name: Publish test report
        uses: mikepenz/action-junit-report@cf701569b05ccdd861a76b8607a66d76f6fd4857
        if: ${{ !cancelled() && hashFiles('test-results.junit.xml') != '' }}
        with:
          report_paths: test-results.junit.xml
          check_name: Unit Test Results
          comment: false
          fail_on_failure: false
          require_tests: true
          include_passed: true
          detailed_summary: true

      - name: Verify coverage report
        if: ${{ success() }}
        run: test -f coverage/lcov.info

      - name: Coverage report
        uses: getsentry/codecov-action@0.3.7
        if: ${{ success() && hashFiles('coverage/lcov.info') != '' }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ./coverage/lcov.info
          coverage-format: lcov
          disable-search: true
          enable-tests: false
          flags: unittests
          name: unit-tests
          informational-project: true
          informational-patch: true
          fail-ci-if-error: true
      - run: pnpm build
      - run: pnpm build:action
      - name: Smoke test action built-in skill resolution
        run: |
          GITHUB_ACTION_PATH="$PWD" node --input-type=module -e "
            const skills = await import('./packages/warden/dist/skills/loader.js');
            const skill = await skills.resolveSkillAsync('security-review');
            if (skill.name !== 'security-review') {
              throw new Error('Expected security-review built-in skill, got ' + skill.name);
            }
          "

      - run: pnpm --filter @sentry/warden pack

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.sha }}
          path: |
            *.tgz
            packages/warden/*.tgz
          if-no-files-found: error
