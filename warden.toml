version = 1

[defaults]
# Fail check on high+ severity findings (critical, high)
failOn = "high"
# Show annotations for medium+ severity findings
reportOn = "medium"
# Exclude build output from all skills
ignorePaths = ["dist/**", "evals/**"]

[[skills]]
name = "security-review"
paths = [
  "src/**/*.ts",
  ".github/workflows/*.yml",
  ".github/workflows/*.yaml",
  ".github/actions/**/*.yml",
  ".github/actions/**/*.yaml",
  "action.yml",
  "action.yaml",
]
ignorePaths = ["src/**/*.test.ts"]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]

[[skills]]
name = "code-review"
paths = [
  "src/**/*.ts",
  ".github/workflows/*.yml",
  ".github/workflows/*.yaml",
  ".github/actions/**/*.yml",
  ".github/actions/**/*.yaml",
  "action.yml",
  "action.yaml",
]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]
